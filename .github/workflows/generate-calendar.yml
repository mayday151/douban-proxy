name: Generate Singapore Events Calendar

on:
  schedule:
    - cron: "0 1 * * *"   # 每天 09:00 新加坡时间 (UTC+8 = UTC 01:00)
  workflow_dispatch:        # 允许手动触发

permissions:
  contents: write           # needed to push the generated ics file

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate calendar ICS
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          EVENTBRITE_API_KEY: ${{ secrets.EVENTBRITE_API_KEY }}
        run: python generate_ics.py

      - name: Commit and push updated ICS
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/singapore-events.ics
          git diff --cached --quiet || git commit -m "chore: update calendar $(date -u +'%Y-%m-%d')"
          git push
