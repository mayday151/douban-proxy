# Singapore Event Calendar - User Preferences
# Edit this file to customize what gets added to your Apple Calendar

# --- MOVIES ---
movies:
  enabled: true
  # TMDB API key - get free one at https://www.themoviedb.org/settings/api
  tmdb_api_key: "298e40de162c0be0d34ea91261a50cde"
  # Language for movie titles and descriptions
  # zh-CN = 简体中文, zh-TW = 繁體中文, en-US = English
  language: "zh-CN"
  # How many days ahead to look for upcoming releases
  lookahead_days: 120
  # Minimum TMDB popularity score (higher = more popular films only)
  # 5 = most releases in SG, 20 = mainstream only, 50 = blockbusters only
  # 30 = mainstream blockbusters, 10 = include mid-tier releases
  min_popularity: 30
  # Only show movies with these genres (leave empty [] for all genres)
  # Options: Action, Adventure, Animation, Comedy, Crime, Documentary,
  #          Drama, Fantasy, Horror, Music, Mystery, Romance, Sci-Fi, Thriller
  genres:
    - Action
    - Adventure
    - Sci-Fi
    - Animation
    - Comedy
    - Thriller
    - Fantasy
    - Mystery
  # Add to calendar even if below popularity threshold if title contains these keywords
  # These bypass all filters — always added regardless of genre/popularity
  must_watch_keywords:
    # Franchises
    - "Marvel"
    - "Avengers"
    - "Spider-Man"
    - "DC"
    - "Batman"
    - "Superman"
    - "Star Wars"
    - "Mission: Impossible"
    - "Mission Impossible"
    - "Fast & Furious"
    - "Fast X"
    - "John Wick"
    - "Avatar"
    - "Jurassic"
    - "Transformers"
    - "Godzilla"
    - "Kong"
    - "Alien"
    - "Predator"
    - "Indiana Jones"
    - "James Bond"
    - "007"
    - "Planet of the Apes"
    - "Dune"
    - "Matrix"
    - "Top Gun"
    - "Gladiator"
    # Directors known for IMAX / visually spectacular films
    - "Nolan"
    - "Villeneuve"
    - "Cameron"
    - "Spielberg"
    - "Ridley Scott"
    - "Zack Snyder"
    # Specific upcoming films
    - "Odyssey"
    - "Minecraft"

# --- CONCERTS & PERFORMANCES ---
events:
  enabled: true
  # Eventbrite API key - optional
  eventbrite_api_key: "YOUR_EVENTBRITE_API_KEY"
  # Event categories to fetch
  categories:
    - music
    - arts
    - theatre
    - musical
  # Search keywords — add artist names you want to track here
  keywords:
    # Types of events
    - "concert"
    - "live music"
    - "musical"
    - "ballet"
    - "orchestra"
    - "opera"
    - "stand-up comedy"
    # Recurring SG events worth tracking
    - "Singapore Symphony"
    - "Singapore Repertory Theatre"
    - "Wild Rice"
    - "Broadway"
    - "West End"
  # Artists to track via Bandsintown (free, no key needed)
  # Add any artist name — will alert you when they have a Singapore show
  artists:
    []
    # Examples:
    # - "Taylor Swift"
    # - "Jay Chou"
    # - "Coldplay"
    # - "Bruno Mars"
  # Always track events at these venues (regardless of keyword match)
  tracked_venues:
    - "Esplanade"
    - "Singapore Indoor Stadium"
    - "Fort Canning Park"
    - "Capitol Theatre"
    - "Victoria Theatre"
    - "Sands Theatre"
    - "MasterCard Theatres"
    - "Gardens by the Bay"
    - "Star Theatre"
    - "The Star Performing Arts Centre"
  # How many days ahead to look
  lookahead_days: 90

# --- CALENDAR SETTINGS ---
calendar:
  name: "Singapore Events"
  timezone: "Asia/Singapore"
  # Add a reminder N minutes before event (0 = no reminder)
  reminder_minutes: 1440  # 24 hours before
  # Refresh interval in minutes (how often Apple Calendar pulls updates)
  refresh_interval: 30
